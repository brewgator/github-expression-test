name: PROOF - GitHub Actions Expression Fix Works

on:
  workflow_dispatch:
    inputs:
      simulate-schedule:
        description: 'Simulate scheduled context (no pull_request object)'
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes for testing
  pull_request:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      workflow-trigger: ${{ steps.metadata.outputs.workflow-trigger }}
    steps:
      - id: metadata
        name: Set workflow trigger
        run: |
          echo "workflow-trigger=${{ github.event_name }}" | tee -a "$GITHUB_OUTPUT"

  # ❌ THIS JOB WILL FAIL - Original broken expression
  test-original-broken:
    name: "❌ ORIGINAL (BROKEN) - Will Fail"
    if: |
      ( needs.setup.outputs.workflow-trigger == 'schedule' ) && true ||
      ( needs.setup.outputs.workflow-trigger == 'pull_request' )
    needs: setup
    # This job uses the EXACT original failing pattern from vault-enterprise
    uses: ./.github/workflows/reusable-test.yml
    with:
      # ⚠️ BROKEN: EXACT vault-enterprise pattern that fails on schedule
      # When scheduled, this evaluates to empty string '' which fails number type validation
      pull-request: ${{ github.event_name == 'pull_request' && github.event.pull_request && github.event.pull_request.number || '' }}

  # ✅ THIS JOB WILL PASS - Fixed expression with proper handling
  test-fixed-working:
    name: "✅ FIXED (WORKING) - Will Pass"
    if: |
      ( needs.setup.outputs.workflow-trigger == 'schedule' ) && true ||
      ( needs.setup.outputs.workflow-trigger == 'pull_request' )
    needs: setup
    # This job uses the FIXED pattern
    uses: ./.github/workflows/reusable-test.yml
    with:
      # ✅ FIXED: Proper handling for schedule context - null when not PR
      pull-request: ${{ github.event_name == 'pull_request' && github.event.pull_request && github.event.pull_request.number || null }}

  # 📊 Debug information to show context
  debug-proof:
    name: "📊 Debug Context"
    runs-on: ubuntu-latest
    steps:
      - name: Show GitHub context
        run: |
          echo "🔍 PROOF OF FIX EVIDENCE:"
          echo "Event Type: ${{ github.event_name }}"
          echo "PR Object Exists: ${{ github.event.pull_request != null }}"
          echo ""
          echo "💡 EXPLANATION:"
          echo "- In workflow_dispatch (like schedule), github.event.pull_request is undefined"
          echo "- Original expression: github.event.pull_request.number tries to access .number on undefined"
          echo "- Fixed expression: github.event.pull_request && github.event.pull_request.number checks existence first"
          echo ""
          echo "📈 EXPECTED RESULTS:"
          echo "- 'ORIGINAL (BROKEN)' job should FAIL with input evaluation error"
          echo "- 'FIXED (WORKING)' job should PASS successfully"