name: reusable-test

on:
  workflow_call:
    inputs:
      pull-request:
        type: number
        description: A pull request number
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Show input
        run: |
          echo "PR Number: '${{ inputs.pull-request }}'"
          echo "Test completed"