name: CLEAN TEST - Fix Works

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes for testing
  pull_request:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      workflow-trigger: ${{ steps.metadata.outputs.workflow-trigger }}
    steps:
      - id: metadata
        name: Set workflow trigger
        run: |
          echo "workflow-trigger=${{ github.event_name }}" | tee -a "$GITHUB_OUTPUT"

  # ✅ THIS JOB WILL PASS - Fixed expression
  test-fixed-working:
    name: "✅ FIXED (WORKING) - Will Pass"
    if: |
      ( needs.setup.outputs.workflow-trigger == 'schedule' ) && true ||
      ( needs.setup.outputs.workflow-trigger == 'workflow_dispatch' ) && true ||
      ( needs.setup.outputs.workflow-trigger == 'pull_request' )
    needs: setup
    # This job uses the FIXED pattern
    uses: ./.github/workflows/reusable-test.yml
    with:
      # ✅ FIXED: Use null instead of empty string when not a PR context
      pull-request: ${{ github.event_name == 'pull_request' && github.event.pull_request && github.event.pull_request.number || null }}

  # 📊 Debug information to show context
  debug-proof:
    name: "📊 Debug Context"
    runs-on: ubuntu-latest
    steps:
      - name: Show GitHub context
        run: |
          echo "🔍 PROOF OF FIX EVIDENCE:"
          echo "Event Type: ${{ github.event_name }}"
          echo "PR Object Exists: ${{ github.event.pull_request != null }}"
          echo ""
          echo "💡 EXPLANATION:"
          echo "- In non-PR contexts (workflow_dispatch, schedule), github.event.pull_request is undefined"
          echo "- Original expression: github.event.pull_request.number || '' causes 'Unexpected value' error"
          echo "- Fixed expression: github.event.pull_request && github.event.pull_request.number || null passes null which is valid"
          echo ""
          echo "📈 EXPECTED RESULTS:"
          echo "- 'FIXED (WORKING)' job should PASS successfully"